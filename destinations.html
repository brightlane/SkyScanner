<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global Destinations | 2026 Flight Audit Portal</title>
    <script src="generate.js"></script>
    <style>
        body { font-family: sans-serif; padding: 40px; background: #f0f4f8; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .city-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; }
        .audit-btn { display: block; margin-top: 15px; background: #0072b2; color: white; padding: 10px; text-decoration: none; border-radius: 6px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>2026 Flight Path Audits</h1>
    <p>Select a destination to view live benchmark pricing and availability.</p>

    <div class="grid" id="destination-grid">
        </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const grid = document.getElementById('destination-grid');
            
            // This pulls the cities directly from your travelDatabase in generate.js
            grid.innerHTML = travelDatabase.map(item => {
                // Creates a URL-friendly version of the city name (e.g., "London" -> "london")
                const slug = item.city.split(',')[0].toLowerCase().trim();
                
                return `
                    <div class="city-card">
                        <h3>${item.city}</h3>
                        <p>${item.desc}</p>
                        <a href="audit.html?item=${slug}-newyork" class="audit-btn">Open Flight Audit</a>
                    </div>
                `;
            }).join('');
        });
    </script>
</body>
</html>
