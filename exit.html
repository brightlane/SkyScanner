<!DOCTYPE html>
<html>
<head>
    <title>Redirecting to Secure Partner...</title>
    <script>
        // --- CONFIGURATION ---
        const IDS = {
            skyscanner: "3740212", // Replace with your Skyscanner/Impact ID
            aliexpress: "_DloV5Xp", // Replace with your AliExpress ID
            linkConnector: "12345"  // Replace with your LinkConnector ID
        };

        function getRedirect() {
            const params = new URLSearchParams(window.location.search);
            const target = params.get('to');
            const query = params.get('q') || 'NYC';

            let finalUrl = "";

            if (target === 'skyscanner') {
                // Generates a deep link to the search results for the city
                const baseUrl = `https://www.skyscanner.com/transport/flights/anywhere/${query}/?adults=1&include_estimates=true`;
                finalUrl = `https://skyscanner.pxf.io/c/${IDS.skyscanner}/1023246/12121?u=${encodeURIComponent(baseUrl)}`;
            } 
            else if (target === 'aliexpress') {
                finalUrl = `https://s.click.aliexpress.com/e/${IDS.aliexpress}`;
            }
            else {
                // Fallback to your main hub if something goes wrong
                finalUrl = "index.html";
            }

            // Short delay to ensure the browser registers the referrer
            setTimeout(() => {
                window.location.replace(finalUrl);
            }, 500);
        }

        window.onload = getRedirect;
    </script>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f8fafc; color: #64748b; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #0072b2; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; margin-right: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
    <p>Auditing best rates for 2026 travel...</p>
</body>
</html>
