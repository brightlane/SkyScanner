// Add this to your calculator.html <script> section
const cityData = {
    "New-York": { stadium: "MetLife Stadium", airport: "EWR", deal: "$420" },
    "Los-Angeles": { stadium: "SoFi Stadium", airport: "LAX", deal: "$380" },
    // This can stay in travelDatabase.js to keep this file clean
};

function injectDynamicContent() {
    const params = new URLSearchParams(window.location.search);
    const slug = params.get('q'); // e.g., "New-York"

    if (slug) {
        const cityName = slug.replace(/-/g, ' ');
        const data = cityData[slug] || { stadium: "Local Arena", airport: "Nearby", deal: "Check Rates" };

        // 1. Change SEO Meta (Crucial for Crawler)
        document.title = `${cityName} 2026 | StadiumStay Audit`;
        
        // 2. Update UI
        document.getElementById('city-title').innerText = `${cityName} Travel Logistics`;
        document.getElementById('stadium-name').innerText = data.stadium;
        
        // 3. Update Affiliate Link
        const affBtn = document.getElementById('affiliate-button');
        affBtn.href = `exit.html?to=skyscanner&q=${data.airport}`;
        affBtn.innerText = `View ${data.deal} Flights to ${data.airport}`;
    }
}
window.onload = injectDynamicContent;
