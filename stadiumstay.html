<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StadiumStay | World Cup 2026 Host City Audit</title>
    
    <meta name="description" content="Official flight and hotel benchmarks for 2026 World Cup stadiums including MetLife, SoFi, and Azteca.">
    
    <script src="generate.js"></script>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "EventSeries",
      "name": "2026 Stadium Travel Audit",
      "description": "Logistics and accommodation planning for global stadium events.",
      "location": {
        "@type": "Place",
        "name": "Global Host Cities"
      }
    }
    </script>

    <style>
        :root { --primary: #0072b2; --accent: #00d46a; --dark: #0f172a; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: #f8fafc; margin: 0; padding: 0; color: var(--dark); }
        
        .hero { background: var(--dark); color: white; padding: 80px 20px; text-align: center; border-bottom: 4px solid var(--accent); }
        .hero h1 { font-size: 2.5rem; margin: 0; letter-spacing: -1px; }
        .hero p { opacity: 0.8; font-size: 1.1rem; max-width: 600px; margin: 15px auto; }

        .pulse-box { display: inline-flex; align-items: center; background: rgba(0,212,106,0.1); color: var(--accent); padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; margin-bottom: 20px; }
        .dot { height: 8px; width: 8px; background: var(--accent); border-radius: 50%; margin-right: 8px; animation: blink 1.5s infinite; }

        .container { max-width: 1100px; margin: -40px auto 60px; padding: 0 20px; }
        
        .stadium-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; }
        
        .card { 
            background: white; 
            border-radius: 20px; 
            padding: 30px; 
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); 
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 20px 30px -10px rgba(0,0,0,0.1); }
        
        .badge { background: #f1f5f9; color: #64748b; font-size: 0.65rem; padding: 4px 10px; border-radius: 50px; font-weight: 800; letter-spacing: 1px; display: inline-block; }
        
        .price-tag { background: #fffbeb; border: 1px solid #fef3c7; padding: 15px; border-radius: 12px; margin: 20px 0; }
        .price-val { font-size: 1.5rem; font-weight: 900; color: var(--dark); }

        .btn-group { display: flex; gap: 12px; margin-top: auto; }
        .btn { flex: 1; text-align: center; padding: 14px; border-radius: 10px; text-decoration: none; font-weight: 700; font-size: 0.85rem; transition: 0.2s; }
        
        .btn-flight { background: var(--primary); color: white; border: 1px solid var(--primary); }
        .btn-flight:hover { background: #005a8d; }
        
        .btn-hotel { background: white; color: var(--primary); border: 2px solid var(--primary); }
        .btn-hotel:hover { background: #f0f7ff; }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<header class="hero">
    <div class="pulse-box"><span class="dot"></span> LIVE AUDIT ACTIVE</div>
    <h1>2026 World Cup Stadium Hub</h1>
    <p>Compare real-time logistics, flight benchmarks, and hotel inventory for every host stadium.</p>
</header>

<div class="container">
    <div id="stadium-list" class="stadium-grid">
        </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const list = document.getElementById('stadium-list');
        
        if (typeof travelDatabase !== 'undefined') {
            list.innerHTML = travelDatabase.map(item => `
                <div class="card">
                    <div>
                        <span class="badge">STADIUM AUDIT: ${item.airport}</span>
                        <h3 style="margin: 15px 0 5px; font-size: 1.4rem;">${item.stadium}</h3>
                        <p style="color: #64748b; font-size: 0.95rem; margin: 0;">${item.city}</p>
                    </div>

                    <div class="price-tag">
                        <div style="font-size: 0.7rem; color: #92400e; font-weight: 700; text-transform: uppercase;">Est. Route Benchmark</div>
                        <div class="price-val">${item.price}</div>
                        <div style="font-size: 0.65rem; color: #b45309;">Verified today for 2026 travel dates</div>
                    </div>

                    <div class="btn-group">
                        <a href="#" class="btn btn-flight sky-link">Book Flights</a>
                        <a href="#" class="btn btn-hotel booking-link">Find Hotels</a>
                    </div>
                </div>
            `).join('');
        } else {
            list.innerHTML = "<p style='text-align:center;'>Initializing travel database...</p>";
        }
    });
</script>

</body>
</html>
