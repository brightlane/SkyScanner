<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StadiumStay | 100+ Global Stadium Event Deals</title>
  <style>
    :root { --primary: #00d46a; --bg: #0a0a0a; --card-bg: #111; --text: #fff; --accent: #f1c40f; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); }
    header { padding: 60px 20px; text-align: center; background: linear-gradient(180deg, #151515 0%, #0a0a0a 100%); border-bottom: 1px solid #222; }
    h1 { font-size: 3rem; margin: 0; letter-spacing: -1px; }
    p.tagline { color: #888; margin-bottom: 30px; font-size: 1.1rem; }
    input { padding: 18px 25px; width: 85%; max-width: 600px; border-radius: 50px; border: 1px solid #333; background: #000; color: #fff; font-size: 1.1rem; outline: none; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(0, 212, 106, 0.3); }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 40px; max-width: 1400px; margin: 0 auto; }
    .card { background: var(--card-bg); border: 1px solid #222; padding: 25px; border-radius: 16px; transition: 0.3s ease; display: flex; flex-direction: column; justify-content: space-between; position: relative; overflow: hidden; }
    .card:hover { border-color: var(--primary); transform: translateY(-5px); background: #161616; }
    .stadium { color: var(--accent); font-size: 0.85rem; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
    .city-name { font-size: 1.8rem; margin: 5px 0; }
    .event-info { color: #aaa; font-size: 0.95rem; margin-bottom: 20px; }
    .btn { display: block; text-align: center; padding: 14px; background: var(--primary); color: #000; text-decoration: none; font-weight: bold; border-radius: 10px; transition: 0.2s; }
    .btn:hover { filter: brightness(1.1); }
    .counter { margin-top: 15px; font-size: 0.9rem; color: #555; }
    footer { text-align: center; padding: 40px; border-top: 1px solid #222; color: #444; font-size: 0.8rem; }
  </style>
</head>
<body>

<header>
  <h1>StadiumStay</h1>
  <p class="tagline">The ultimate travel portal for global stadium events.</p>
  <input type="text" id="search" placeholder="Search 100 destinations (e.g. 'World Cup' or 'London')" onkeyup="render()">
  <div id="counter" class="counter"></div>
</header>

<main class="grid" id="grid"></main>

<footer>
  <p>&copy; 2026 StadiumStay Global Network. All rights reserved.</p>
  <p>Affiliate Link Policy: We may earn a commission from bookings made through this site.</p>
</footer>

  { city:"Sydney", stadium:"Accor Stadium", airport:"SYD", event:"Rugby League" },

  { city:"Seoul", stadium:"World Cup Stadium", airport:"ICN", event:"K-League" },
  { city:"Ahmedabad", stadium:"Narendra Modi", airport:"AMD", event:"Cricket World Cup" },
  { city:"Rio de Janeiro", stadium:"Maracanã", airport:"GIG", event:"Copa Libertadores" },
  { city:"Buenos Aires", stadium:"Monumental", airport:"EZE", event:"Superclásico" },
  { city:"Doha", stadium:"Lusail Stadium", airport:"DOH", event:"Asian Cup" },

  { city:"Johannesburg", stadium:"FNB Stadium", airport:"JNB", event:"SA Premier League" }
  // Note: List truncated for code block, duplicate these to hit 100 based on your niche!
];

// Helper to fill the list to 100 for your deploy if needed
while(cities.length < 100) {
  cities.push({ city:"Expanding Hub", stadium:"Main Arena", airport:"INT", event:"Global Event" });
}

function render() {
  const query = document.getElementById("search").value.toLowerCase();
  const grid = document.getElementById("grid");
  const counter = document.getElementById("counter");
  
  const filtered = cities.filter(c => 
    c.city.toLowerCase().includes(query) || 
    c.stadium.toLowerCase().includes(query) || 
    c.event.toLowerCase().includes(query)
  );

  counter.innerText = `Showing ${filtered.length} of ${cities.length} available routes`;

  grid.innerHTML = filtered.map(c => `
    <article class="card">
      <div>
        <div class="stadium">🏟 ${c.stadium}</div>
        <h2 class="city-name">${c.city}</h2>
        <div class="event-info">${c.event}</div>
      </div>
      <a class="btn" 
         href="${AFFILIATE_BASE}&aff_sub=${c.airport}" 
         target="_blank" 
         rel="noopener">
         Find Flights to ${c.airport}
      </a>
    </article>
  `).join("");
}

render();
</script>

</body>
</html>
