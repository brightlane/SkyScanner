<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    
    <title id="dynamic-title">StadiumStay | 2026 World Cup & Global Stadium Deals</title>
    <meta name="description" id="dynamic-desc" content="Ultimate travel portal for World Cup 2026. Get live flight deals to major stadiums worldwide. Updated daily.">
    
    <script src="generate.js"></script>

    <style>
        :root { 
            --primary: #00d46a; 
            --primary-hover: #00ff7f;
            --bg: #050505; 
            --card-bg: #121212; 
            --text: #ffffff; 
            --accent: #f1c40f; 
        }

        body { margin: 0; font-family: 'Inter', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
        
        .timer-bar {
            background: linear-gradient(90deg, #1a1a1a, #004d26, #1a1a1a);
            color: var(--primary);
            text-align: center;
            padding: 12px;
            font-size: 0.85rem;
            font-weight: 800;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--primary);
            position: sticky; top: 0; z-index: 1000;
        }

        header { padding: 60px 20px 40px; text-align: center; background: radial-gradient(circle at top, #1a1a1a 0%, #050505 100%); }
        h1 { font-size: clamp(2.5rem, 8vw, 4.2rem); margin: 0; font-weight: 800; letter-spacing: -2px; background: linear-gradient(to right, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .nav-links { margin-top: 20px; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .nav-links a { color: #888; text-decoration: none; font-size: 0.9rem; font-weight: 600; border: 1px solid #333; padding: 5px 15px; border-radius: 20px; transition: 0.3s; }
        .nav-links a:hover { color: var(--primary); border-color: var(--primary); }

        .search-container { max-width: 650px; margin: 25px auto; }
        input { padding: 20px 30px; width: 100%; box-sizing: border-box; border-radius: 50px; border: 1px solid #333; background: rgba(255,255,255,0.05); color: #fff; font-size: 1.1rem; outline: none; backdrop-filter: blur(10px); }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; padding: 40px 20px; max-width: 1400px; margin: 0 auto; }
        .card { background: var(--card-bg); border: 1px solid #222; padding: 35px; border-radius: 24px; position: relative; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; flex-direction: column; justify-content: space-between; }
        .card:hover { border-color: var(--primary); transform: translateY(-8px); }

        .price-alert { background: rgba(0, 212, 106, 0.1); color: var(--primary); padding: 10px; border-radius: 10px; font-size: 0.8rem; margin-bottom: 20px; text-align: center; border: 1px dashed var(--primary); }
        .btn { display: block; text-align: center; padding: 18px; background: var(--primary); color: #000; text-decoration: none; font-weight: 800; border-radius: 15px; }
        
        footer { text-align: center; padding: 60px 40px; color: #444; font-size: 0.8rem; border-top: 1px solid #111; }
    </style>
</head>
<body>

<div class="timer-bar" id="countdown">LOADING COUNTDOWN...</div>

<header>
    <a href="index.html" style="text-decoration:none"><h1>StadiumStay</h1></a>
    <p id="sub-header" style="color:#666; font-size: 1.2rem;">World Cup 2026 & Global Stadium Travel Portal</p>
    
    <div class="nav-links">
        <a href="destinations.html">Destinations</a>
        <a href="calculator.html">Budget Tool</a>
        <a href="blog.html">Daily Deals</a>
        <a href="stadiumstay.html">World Cup Hub</a>
    </div>

    <div class="search-container">
        <input type="text" id="search" placeholder="Search stadium, city, or event..." onkeyup="render()">
    </div>
</header>

<main class="grid" id="grid"></main>

<footer>
    <p>&copy; 2026 StadiumStay Global Network | Part of the Skyscanner Affiliate Program</p>
</footer>

<script>
// 1. DATA HUB - (The 500-Page Engine)
const cities = [
    { city:"New York / NJ", stadium:"MetLife Stadium", airport:"EWR", event:"World Cup 2026 Final", region:"america" },
    { city:"Los Angeles", stadium:"SoFi Stadium", airport:"LAX", event:"World Cup 2026", region:"america" },
    { city:"Mexico City", stadium:"Estadio Azteca", airport:"MEX", event:"World Cup 2026", region:"america" },
    { city:"London", stadium:"Wembley Stadium", airport:"LHR", event:"Champions League", region:"europe" },
    { city:"Manchester", stadium:"Old Trafford", airport:"MAN", event:"Premier League", region:"europe" },
    { city:"Tokyo", stadium:"Japan National Stadium", airport:"NRT", event:"J-League", region:"asia" },
    { city:"Munich", stadium:"Allianz Arena", airport:"MUC", event:"Bundesliga", region:"europe" },
    { city:"Barcelona", stadium:"Camp Nou", airport:"BCN", event:"La Liga", region:"europe" }
    // You can add 500 more here easily
];

const MASTER_URL = typeof SKYSCANNER_URL !== 'undefined' ? SKYSCANNER_URL : "http://convert.ctypy.com/aff_c?offer_id=29465&aff_id=21885";

function updateTimer() {
    const eventDate = new Date("June 11, 2026 16:00:00").getTime();
    const now = new Date().getTime();
    const diff = eventDate - now;
    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    document.getElementById("countdown").innerText = `⏳ WORLD CUP 2026 KICKOFF: ${days} DAYS ${hours} HOURS`;
}
setInterval(updateTimer, 1000); updateTimer();

function render() {
    const params = new URLSearchParams(window.location.search);
    const urlQuery = params.get('q') || '';
    const searchInput = document.getElementById("search").value.toLowerCase();
    const finalQuery = searchInput || urlQuery.toLowerCase();

    // DYNAMIC SEO TRICK: Change Title and Header based on URL
    if (urlQuery) {
        document.getElementById('dynamic-title').innerText = `Flight Deals to ${urlQuery} | StadiumStay 2026`;
        document.getElementById('sub-header').innerText = `Best 2026 travel routes for ${urlQuery}`;
    }

    const filtered = cities.filter(c => 
        c.city.toLowerCase().includes(finalQuery) || 
        c.stadium.toLowerCase().includes(finalQuery) || 
        c.event.toLowerCase().includes(finalQuery)
    );

    document.getElementById("grid").innerHTML = filtered.map((c, i) => {
        const day = new Date().getDate();
        return `
            <article class="card">
                <div>
                    <div style="color:var(--accent); font-size:0.8rem; font-weight:800; text-transform:uppercase;">${c.stadium}</div>
                    <h2 style="font-size:2rem; margin:5px 0;">${c.city}</h2>
                    <div style="color:#888; margin-bottom:20px;">${c.event}</div>
                    <div class="price-alert">Route Audit: Verified availability to ${c.airport}</div>
                </div>
                <a class="btn sky-link" href="${MASTER_URL}&aff_sub=${c.airport}_idx" target="_blank">
                    Book Flight to ${c.airport}
                </a>
            </article>
        `;
    }).join("");
}

window.onload = render;
</script>
</body>
</html>
