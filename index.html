<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Explore countries, cities, area codes, and more. Interactive lookup and tips to discover global coverage instantly!">

<title>Global Lookup & Interactive Tips</title>
<style>
body { font-family: Arial, sans-serif; margin:0; padding:0; background:#0b1f3f; color:#fff; }
section, header, footer { max-width:900px; margin:0 auto; }
h1,h2,h3,h4,p { margin:10px 0; cursor:pointer; }
.btn-cta { background:#ffcc00; color:#000; padding:15px 30px; font-weight:bold; text-decoration:none; border-radius:5px; display:inline-block; margin:10px 0; transition: transform 0.2s ease, box-shadow 0.2s ease; cursor:pointer; }
.btn-cta:hover { transform: scale(1.05); box-shadow:0 4px 15px rgba(0,0,0,0.3); }
.lookup-widget, .tip-box, .result-box { background:#11264d; padding:20px; border-radius:8px; margin:15px 0; box-shadow:0 2px 5px rgba(0,0,0,0.5); cursor:pointer; }
#stickyCTA { position:fixed; bottom:20px; right:20px; z-index:9999; box-shadow:0 4px 15px rgba(0,0,0,0.5); }
#progressBar { position:fixed; top:0; left:0; width:0%; height:5px; background:#ffcc00; z-index:9999; transition:width 0.25s ease; }
</style>
</head>

<body>
<div id="progressBar"></div>

<header style="background:#11264d; color:#fff; padding:60px 20px; text-align:center;">
<h1 id="heroTitle"></h1>
<p id="heroDesc"></p>
<a href="https://is.gd/et9lWW" class="btn-cta" id="heroCTA"></a>
<div style="margin-top:30px; display:flex; justify-content:center; gap:15px; flex-wrap:wrap;">
<div class="lookup-widget" id="widget1"></div>
<div class="lookup-widget" id="widget2"></div>
<div class="lookup-widget" id="widget3"></div>
<div class="lookup-widget" id="widget4"></div>
</div>
</header>

<section>

<h2 id="faqTitle"></h2>
<div class="lookup-widget" id="faq1"></div>
<div class="lookup-widget" id="faq2"></div>
<div class="lookup-widget" id="faq3"></div>

<div class="lookup-widget" id="testimonial1"></div>
<div class="lookup-widget" id="testimonial2"></div>

<!-- Skyscanner Promo -->
<section id="skyscannerPromoSection" style="margin:30px 0; text-align:center; background:#11264d; padding:20px; border-radius:10px; box-shadow:0 2px 5px rgba(0,0,0,0.5);">

<a href="https://is.gd/et9lWW" id="stickyCTA" class="btn-cta">Start Your Global Lookup →</a>

<!-- Popup CTA -->
<div id="popupCTA" style="position:fixed; bottom:50px; right:50px; background:#ffcc00; color:#000; padding:20px; border-radius:10px; box-shadow:0 4px 15px rgba(0,0,0,0.5); display:none; z-index:10000;">
<p style="margin:0; font-weight:bold;">Start Your Free Global Lookup Now!</p>
<a href="https://is.gd/et9lWW" class="btn-cta" style="margin-top:10px; display:block;">Click Here →</a>
<span id="closePopup" style="position:absolute; top:5px; right:10px; cursor:pointer; font-weight:bold;">×</span>
</div>

<footer style="text-align:center; padding:30px 20px;" id="footerText"></footer>

<script>
// Scroll progress
window.onscroll = function() {
const scrollTop = document.documentElement.scrollTop || document.body.scrollTop;
const scrollHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
document.getElementById("progressBar").style.width = (scrollTop / scrollHeight * 100) + "%";
};

// Multilingual content
const content = {/* insert multilingual content object from previous snippet */};
const userLang = navigator.language.slice(0,2);
const lang = content[userLang] ? userLang : 'en';
const c = content[lang];
Object.keys(c).forEach(id => { const el = document.getElementById(id); if(el) el.innerHTML = c[id]; });

// Daily news
async function fetchNews() {
    const rssUrl = "https://www.travel-advisory.info/rss";
    try {
        const response = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`);
        const data = await response.json();
        document.getElementById('newsBox').innerHTML = "<ul>" + data.items.slice(0,3).map(item =>
            `<li><a href="${item.link}" target="_blank">${item.title}</a></li>`).join("") + "</ul>";
    } catch(e) { document.getElementById('newsBox').textContent = "Unable to load news."; }
}
fetchNews();

// Skyscanner promo rotation
const skyscannerArticles = [
"Compare global flights instantly and save big on your next trip.",
"Looking for the best travel deals? Skyscanner helps you find flights, hotels, and car rentals.",
"Plan smarter, travel cheaper! Skyscanner provides real-time flight comparisons worldwide.",
"Discover unbeatable deals on flights across the globe. Start planning your dream trip today!",
"Instant flight comparisons, savings, and hassle-free booking—Skyscanner is your travel companion!"
];
const today = new Date();
document.getElementById('skyscannerPromoText').textContent = skyscannerArticles[today.getDate() % skyscannerArticles.length];

// Popup CTA
setTimeout(()=>{ document.getElementById('popupCTA').style.display='block'; },10000);
document.getElementById('closePopup').onclick = ()=>{ document.getElementById('popupCTA').style.display='none'; };
</script>
</body>
