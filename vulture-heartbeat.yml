name: Vulture 10K Engine

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Clears the deprecation warning

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Uses the latest recommended version

      - name: Expand Database
        run: node expand-database.js

      - name: Build 10k Pages
        run: node generate.js

      - name: Inject Freshness
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          # This specifically updates the "Syncing..." text in all generated files
          find . -maxdepth 1 -name "*.html" -exec sed -i "s/Syncing.../$TIMESTAMP/g" {} +

      - name: Update Sitemap
        run: |
          if [ -f "generate-sitemap.js" ]; then
            node generate-sitemap.js
          fi

      - name: Commit 10k Updates
        run: |
          git config --global user.name "Vulture-Engine-Bot"
          git config --global user.email "bot@vulture.engine"
          git add .
          # Check if there are changes to avoid empty commit errors
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Vulture 10K: Hourly Sync [Skip CI]"
            git push
          fi
