name: Scheduled Data Update

on:
  schedule:
    - cron: '0 0 * * *'  # This runs the workflow every day at midnight UTC

jobs:
  update-data:
    runs-on: ubuntu-latest  # Run this job on the latest Ubuntu runner

    steps:
      # Step 1: Checkout the repository to access the files
      - name: Checkout repository
        uses: actions/checkout@v2

      # Step 2: Fetch data from API (replace URL with your actual API endpoint)
      - name: Fetch data from API
        run: |
          curl -o data.json "https://api.example.com/data"  # Replace with your actual API URL
          echo "Data fetched successfully"

      # Step 3: Process the fetched data (processData.js is a custom script you need to create)
      - name: Process data
        run: |
          node processData.js  # This script will process the fetched data and update your site

      # Step 4: Commit and push the changes (commits processed data back to repository)
      - name: Commit and push changes
        run: |
          git add .
          git commit -m "Automated data update"
          git push
