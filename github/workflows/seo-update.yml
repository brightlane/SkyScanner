name: SEO Update

on:
  schedule:
    - cron: '0 0 * * 0'  # Runs every Sunday at midnight UTC

jobs:
  seo-update:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v2

      # Step 2: Regenerate Sitemap
      - name: Regenerate Sitemap
        run: |
          node generate-sitemap.js  # Assuming you have this script in your repo to generate a fresh sitemap
          git add sitemap.xml        # Add the new sitemap to git
          git commit -m "Automated Sitemap Update"  # Commit the updated sitemap
          git push                    # Push changes to the repository

      # Step 3: Update SEO Meta Tags
      - name: Update SEO Meta Tags
        run: |
          node update-seo.js  # Custom script to update meta tags for SEO
          git add .           # Add all changes (HTML files) to git
          git commit -m "Automated SEO Meta Tag Update"  # Commit the SEO updates
          git push            # Push the changes to the repository
