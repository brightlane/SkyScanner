<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Lost in Transit</title>
    <style>
        :root { --accent: #f43f5e; --deep: #0f172a; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--deep); color: white; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; overflow: hidden; }
        
        .container { padding: 20px; z-index: 2; }
        .glitch { font-size: 8rem; font-weight: 900; position: relative; color: white; letter-spacing: -5px; line-height: 1; }
        .glitch::after { content: '404'; position: absolute; left: 2px; text-shadow: -2px 0 #ff00c1; top: 0; color: white; background: var(--deep); overflow: hidden; clip: rect(0,900px,0,0); animation: noise-anim 2s infinite linear alternate-reverse; }

        @keyframes noise-anim {
            0% { clip: rect(10px, 9999px, 50px, 0); }
            100% { clip: rect(80px, 9999px, 100px, 0); }
        }

        h2 { font-size: 1.5rem; margin-bottom: 10px; font-weight: 300; color: #94a3b8; }
        p { margin-bottom: 30px; font-size: 0.9rem; color: #64748b; }

        .links-404 { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        .btn-404 { padding: 12px 20px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; text-decoration: none; border-radius: 4px; font-size: 0.8rem; transition: 0.3s; }
        .btn-404:hover { background: white; color: var(--deep); }
        .highlight { border-color: var(--accent); color: var(--accent); }

        .bg-text { position: absolute; font-size: 20vw; font-weight: 900; color: rgba(255,255,255,0.02); z-index: 1; white-space: nowrap; pointer-events: none; }
    </style>
</head>
<body>

    <div class="bg-text">OUT OF BOUNDS</div>

    <div class="container">
        <div class="glitch">404</div>
        <h2>Looks like you've wandered off the grid.</h2>
        <p>This destination hasn't been mapped for the 2026 season yet.</p>

        <div class="links-404">
            <a href="index.html" class="btn-404">Return to Terminal</a>
            <a href="deals.html" class="btn-404 highlight">Find a Real Deal</a>
            <a href="map.html" class="btn-404">Explore Hidden Gems</a>
            <a href="vault.html" class="btn-404">The Points Vault</a>
        </div>
    </div>

</body>
</html>
