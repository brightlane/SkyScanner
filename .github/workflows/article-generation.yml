name: Daily Article Generation

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight
  workflow_dispatch: # Allows you to run it manually for testing

permissions:
  contents: write # Allows the bot to push generated articles to the repo

jobs:
  generate-articles:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Checks if requirements.txt exists before trying to install
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          elif [ -f reqs.txt ]; then
            pip install -r reqs.txt
          else
            echo "No requirements.txt found, installing base packages..."
            pip install requests pandas # Add common packages you use here
          fi

      - name: Run Article Generation Script
        run: |
          # Ensure this filename matches your python script exactly
          python main.py 

      - name: Configure Git Identity
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Commit and Push Changes
        run: |
          # Use the folder where your script outputs the .md or .html files
          git add generated-articles/ 
          
          # Only commits if there are changes to avoid "nothing to commit" errors
          if git diff --staged --quiet; then
            echo "No new content generated today."
          else
            git commit -m "Daily SEO Refresh: Skyscanner automated update"
            git push
          fi
