name: Daily Article Generation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  generate-articles:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Checkout the repository to access the code
      - name: Checkout code
        uses: actions/checkout@v2

      # Step 2: Set up Git identity
      - name: Set up Git identity
        run: |
          git config --global user.name "Your Name"
          git config --global user.email "you@example.com"

      # Step 3: Run your article generation scripts
      - name: Generate Articles
        run: |
          python article_generator1.py
          python article_generator2.py
          python article_generator3.py

      # Step 4: Stage generated articles for commit
      - name: Git add generated articles
        run: |
          git add generated-articles/
          git commit -m "Automated article generation"
          
      # Step 5: Push generated articles back to the repository (optional)
      - name: Push generated articles to repository
        run: |
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Token to authenticate the push
