name: Daily Article Generation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  generate-articles:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Checkout the code
      - name: Checkout code
        uses: actions/checkout@v2

      # Step 2: Set up Git identity (This step resolves the "unknown author" error)
      - name: Set up Git identity
        run: |
          git config --global user.name "Your Name"
          git config --global user.email "you@example.com"
      
      # Step 3: Install Python dependencies (if required)
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt  # Ensure you have this file with dependencies listed if needed

      # Step 4: Run your article generation scripts
      - name: Generate Articles
        run: |
          python article_generator1.py
          python article_generator2.py
          python article_generator3.py

      # Step 5: Stage the generated articles and commit the changes
      - name: Git add and commit generated articles
        run: |
          git add generated-articles/
          git commit -m "Automated article generation" || echo "No changes to commit" # Avoids errors if nothing changes

      # Step 6: Push generated articles back to the repository
      - name: Push changes to repository
        run: |
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # GitHub automatically provides a token for pushing changes
