name: Vulture 10K Skyscanner Engine

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'  # Automatic daily refresh at midnight
  workflow_dispatch:      # Allows manual trigger via "Run workflow" button

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: 🛰️ Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Essential for high-volume commits

      - name: 🐍 Setup Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: 📦 Install Engine Dependencies
        run: |
          python -m pip install --upgrade pip
          # Add any python libraries if needed later (e.g., pip install requests)

      - name: 🛠️ Run Skyscanner Route Generator
        run: python scripts/vulture_gen.py

      - name: 🗺️ Refresh Global Sitemap
        run: python scripts/generate_sitemap.py

      - name: 📡 AI Ecosystem Broadcast
        env:
          AYRSHARE_API_KEY: ${{ secrets.AYRSHARE_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
        run: python scripts/ai_broadcaster.py

      - name: 🚀 Sync and Push 10K Stack
        run: |
          git config --global user.name "Nexus-Stack-Bot"
          git config --global user.email "bot@nexusstack.io"
          
          # Stage the new flight pages and sitemap
          git add .
          
          # Commit the changes (exits gracefully if nothing changed)
          git commit -m "Vulture 10K: Route Expansion Sync $(date +'%Y-%m-%d')" || exit 0
          
          # Handle potential conflicts by favoring the bot's generated content
          git pull origin main --rebase -X ours
          
          # Push the thousands of new files to live repo
          git push origin main
