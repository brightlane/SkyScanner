name: Daily Article Generation

# Trigger the workflow on a schedule (UTC time)
on:
  schedule:
    - cron: '0 0 * * *'  # Runs the job every day at midnight UTC

# This workflow has one job
jobs:
  generate-articles:
    runs-on: ubuntu-latest  # GitHub Actions runner with Ubuntu

    steps:
    # Step 1: Checkout the repository
    - name: Checkout repository
      uses: actions/checkout@v2  # Checks out the code from the GitHub repository

    # Step 2: Set up Node.js environment
    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '16'  # Set the Node.js version (adjust to the version your script uses)

    # Step 3: Install dependencies (if you have a package.json)
    - name: Install dependencies
      run: |
        npm install  # If you have a package.json file, it will install dependencies here
        # If you don't have a package.json, you can remove this step

    # Step 4: Run the article generation script
    - name: Run the article generation script
      run: |
        node generateSkyscannerArticles2.js 10  # Runs the script and generates 10 articles (you can adjust this number)

    # Step 5: Commit and push generated articles back to the repository
    - name: Commit and push generated articles
      run: |
        git config --global user.name 'GitHub Actions'  # Configuring the user for the commit
        git config --global user.email 'actions@github.com'  # Configuring the email for the commit
        git add .  # Staging the changes
        git commit -m "Automated article generation"  # Committing the changes
        git push  # Pushing the changes to the repository
