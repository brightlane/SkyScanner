name: Article Generation

on:
  # Trigger the workflow on a schedule (every day at midnight UTC)
  schedule:
    - cron: '0 0 * * *'  # Runs at midnight UTC daily
  # Allow manual triggering of the workflow with a "Run" button
  workflow_dispatch:   # This allows manual triggering of the workflow

jobs:
  generate-articles:
    runs-on: ubuntu-latest  # GitHub runner with Ubuntu OS

    steps:
    # Step 1: Checkout the repository
    - name: Checkout repository
      uses: actions/checkout@v2

    # Step 2: Set up Node.js environment
    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '16'  # Node version, adjust if needed

    # Step 3: Install dependencies (if any)
    - name: Install dependencies
      run: |
        npm install  # Install any required packages listed in package.json

    # Step 4: Run the article generation script
    - name: Run article generation script
      run: |
        node generateSkyscannerArticles2.js 10  # Adjust the number if needed

    # Step 5: Commit and push generated articles back to the repository
    - name: Commit and push generated articles
      run: |
        git config --global user.name 'GitHub Actions'
        git config --global user.email 'actions@github.com'
        git add .
        git commit -m "Automated article generation"
        git push
