name: 'Build and Deploy to GKE'

# Trigger the workflow on push to the main branch, and also allow manual triggers
on:
  push:
    branches:
      - "main"
  workflow_dispatch:  # Allow manual triggering via the "Run" button in GitHub UI

env:
  PROJECT_ID: 'my-project'  # TODO: update to your Google Cloud project ID
  GAR_LOCATION: 'us-central1'  # TODO: update to your region
  GKE_CLUSTER: 'cluster-1'  # TODO: update to your cluster name
  GKE_ZONE: 'us-central1-c'  # TODO: update to your cluster zone
  DEPLOYMENT_NAME: 'gke-test'  # TODO: update to your deployment name
  REPOSITORY: 'samples'  # TODO: update to your Artifact Registry docker repository name
  IMAGE: 'static-site'
  WORKLOAD_IDENTITY_PROVIDER: 'projects/123456789/locations/global/workloadIdentityPools/my-pool/providers/my-provider'  # TODO: update to your workload identity provider

jobs:
  setup-build-publish-deploy:
    name: 'Setup, Build, Publish, and Deploy'
    runs-on: 'ubuntu-latest'
    environment: 'production'

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      # Checkout the code
      - name: 'Checkout'
        uses: 'actions/checkout@v4'

      # Authenticate to Google Cloud using Workload Identity Federation
      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: '${{ env.WORKLOAD_IDENTITY_PROVIDER }}'

      # Authenticate Docker to Google Cloud Artifact Registry
      - name: 'Docker Auth'
        uses: 'docker/login-action@v3'
        with:
          username: 'oauth2accesstoken'
          password: '${{ steps.auth.outputs.auth_token }}'
          registry: '${{ env.GAR_LOCATION }}-docker.pkg.dev'

      # Get the GKE credentials to deploy to the cluster
      - name: 'Set up GKE credentials'
        uses: 'google-github-actions/get-gke-credentials@v2'
        with:
          cluster_name: '${{ env.GKE_CLUSTER }}'
          location: '${{ env.GKE_ZONE }}'

      # Build the Docker container and push it to Google Artifact Registry
      - name: 'Build and push Docker container'
        run: |
          DOCKER_TAG="${GAR_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/${IMAGE}:${GITHUB_SHA}"

          docker build \
            --tag "${DOCKER_TAG}" \
            --build-arg GITHUB_SHA="${GITHUB_SHA}" \
            --build-arg GITHUB_REF="${GITHUB_REF}" \
            .

          docker push "${DOCKER_TAG}"

      # Install Kustomize for Kubernetes deployment
      - name: 'Set up Kustomize'
        run: |
          curl -sfLo kustomize https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz
          chmod u+x ./kustomize

      # Deploy the Docker container to GKE
      - name: 'Deploy to GKE'
        run: |
          # Replace image name in k8s template using kustomize
          ./kustomize edit set image LOCATION-docker.pkg.dev/PROJECT_ID/REPOSITORY/IMAGE:TAG=$GAR_LOCATION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE:$GITHUB_SHA
          
          # Build and apply the Kubernetes deployment configuration
          ./kustomize build . | kubectl apply -f -
          
          # Wait for the deployment to roll out
          kubectl rollout status deployment/$DEPLOYMENT_NAME
          
          # Get services information
          kubectl get services -o wide
