name: Vulture 10K Engine

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

jobs:
  vulture-run:
    runs-on: ubuntu-latest
    permissions:
      contents: write # CRITICAL: Gives the bot permission to save files
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # Uses your internal security key

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build and Sync
        run: |
          node expand-database.js || echo "Skip Expand"
          node generate.js || echo "Skip Generate"
          node generate-sitemap.js || echo "Skip Sitemap"

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          # This check prevents a failure if nothing changed
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to sync"
          else
            git commit -m "Vulture 10K Sync [Skip CI]"
            git push origin main
          fi
