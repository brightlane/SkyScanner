name: SkyScanner Vulture-Heartbeat
on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

env:
  # This stops the runner from complaining about the Node version mismatch
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  vulture-run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Cache removed to prevent the "lock file not found" error

      - name: Run Vulture Engine
        run: |
          node generate.js || echo "generate.js skipped"
          node vulture-generator.js || echo "vulture-generator.js skipped"
          node generate-sitemap.js || echo "sitemap skipped"

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Vulture 10K Sync [Skip CI]" || exit 0
          git push
