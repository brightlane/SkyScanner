name: Vulture 10K Engine

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 * * * *'

jobs:
  vulture-run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Engine
        run: |
          # Only run if the files exist to prevent 'Failure' circles
          [ -f "expand-database.js" ] && node expand-database.js || echo "No expander found"
          [ -f "generate.js" ] && node generate.js || echo "No generator found"

      - name: SEO Freshness
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          find . -maxdepth 1 -name "*.html" -exec sed -i "s/Syncing.../$TIMESTAMP/g" {} +
          echo "Freshness injected at $TIMESTAMP"

      - name: Commit Results
        run: |
          git config --global user.name "Vulture-Bot"
          git config --global user.email "bot@vulture.io"
          git add .
          # This line prevents the 'Failure' if there is nothing new to commit
          git diff --quiet && git diff --staged --quiet || (git commit -m "Vulture Sync [Skip CI]" && git push)
