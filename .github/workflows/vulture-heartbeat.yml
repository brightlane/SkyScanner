name: Vulture 10K Engine

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

jobs:
  vulture-run:
    runs-on: ubuntu-latest
    permissions:
      contents: write # This is the "Key" to saving your files
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Pages and Sitemap
        run: |
          # 1. Expand the city list
          node expand-database.js || echo "Database expansion skipped"
          # 2. Generate the HTML files
          node generate.js || echo "Page generation failed"
          # 3. Generate the Sitemap
          node generate-sitemap.js || echo "Sitemap generation failed"

      - name: Inject SEO Freshness
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          find . -maxdepth 1 -name "*.html" -exec sed -i "s/Syncing.../$TIMESTAMP/g" {} +

      - name: Force Save to GitHub
        run: |
          git config --global user.name "Vulture-Bot"
          git config --global user.email "bot@vulture.io"
          git add .
          # This saves the files. If it fails here, the 'Permissions' in Step 1 are wrong.
          git commit -m "Vulture Sync: $(date)" || echo "No changes to save"
          git push origin main
