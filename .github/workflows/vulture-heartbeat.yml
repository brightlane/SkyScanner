name: SkyScanner Vulture-Heartbeat
on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 * * * *' # Hourly Inventory Sync
  workflow_dispatch:

# Silences the Node 20 deprecation warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  vulture-run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Updated to v4.2.2 for Node 24 compatibility
      - name: Checkout Repository
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1 

      # Updated to v4.1.0 for Node 24 compatibility
      - name: Setup Node.js
        uses: actions/setup-node@v4.1.0
        with:
          node-version: '20' # Keeps your SkyScanner engine running on the version it was built for
          cache: 'npm'

      - name: Run Vulture Engine
        run: |
          node generate.js
          node vulture-generator.js
          node generate-sitemap.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Vulture 10K Sync [Skip CI]" || exit 0
          git push
