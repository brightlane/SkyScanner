name: Optimized Vulture Deployment

on:
  push:
    branches:
      - main  # Trigger on pushing to the main branch
  workflow_dispatch:  # Manual trigger allowed

jobs:
  # Job 1: Set up environment and install dependencies
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '16'  # Set Node.js version

      - name: Cache Node.js dependencies
        uses: actions/cache@v2
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm install

  # Job 2: Fetch Data (Parallel with the build)
  fetch-data:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Fetch flight data from API
        run: |
          curl -o data.json "https://api.example.com/data"  # Replace with real API
          echo "Data fetched successfully"

  # Job 3: Build Project (Parallel with the data fetch)
  build:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Build the project
        run: |
          npm run build  # Customize if your build command differs

  # Job 4: Deploy to GitHub Pages (Only runs after the build and data fetch complete)
  deploy:
    runs-on: ubuntu-latest
    needs: [build, fetch-data]  # Ensure this job only runs after build and data fetch

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          personal_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./  # Customize if build output is in another directory

  # Job 5: Send Notifications on Success or Failure
  notify:
    runs-on: ubuntu-latest
    needs: deploy
    if: success()  # This only runs if the deploy job succeeded

    steps:
      - name: Notify on successful deployment
        run: |
          echo "Deployment successful!"
          # Add Slack notification or email sending here if needed
          # Example: curl -X POST -d "Deployment successful!" ${SLACK_WEBHOOK_URL}

  # Error notification in case of failure
  notify-on-failure:
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()  # This runs only if any previous job failed

    steps:
      - name: Notify on failure
        run: |
          echo "Deployment failed!"
          # Send Slack or Email Notification of failure
          # Example: curl -X POST -d "Deployment failed!" ${SLACK_WEBHOOK_URL}
