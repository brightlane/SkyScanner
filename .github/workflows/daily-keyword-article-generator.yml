jobs:
  generate-articles:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      # Set up Git user identity
      - name: Set up Git identity
        run: |
          git config --global user.email "your-email@example.com"  # Use your email address
          git config --global user.name "Your Name"  # Use your name or a placeholder for GitHub Actions

      # Run article generation script
      - name: Generate articles
        run: node generateSkyscannerArticles.js 288  # Adjust as needed

      # Add and commit generated articles
      - name: Commit generated articles
        run: |
          git add generated-articles/
          git commit -m "Automated daily article update"
          git push origin main

      # Optionally, deploy to GitHub Pages (if needed)
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          personal_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./generated-articles  # Adjust if necessary
