name: Daily Article Generation

on:
  schedule:
    - cron: '0 9 * * *'  # Runs at 9 AM UTC every day
  workflow_dispatch:  # Allows manual trigger if needed

jobs:
  generate-articles:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '16'  # Specify Node.js version if needed

      - name: Set up Git identity
        run: |
          git config --global user.email "you@example.com"
          git config --global user.name "Your Name"

      - name: Install dependencies
        run: |
          npm install  # If you have dependencies in package.json

      - name: Generate Article 1
        run: |
          node generateSkyscannerArticles1.js 288  # Modify for first generator

      - name: Generate Article 2
        run: |
          node generateSkyscannerArticles2.js 288  # Modify for second generator

      - name: Generate Article 3
        run: |
          node generateSkyscannerArticles3.js 288  # Modify for third generator

      - name: Commit generated articles
        run: |
          git add generated-articles/
          git commit -m "Automated daily article generation"
          git push origin main  # Push to the main branch

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          personal_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./generated-articles  # Path to the directory with generated articles
