name: Daily Article Generation

on:
  schedule:
    - cron: '0 9 * * *'  # Runs at 9 AM UTC every day (adjust timing as needed)
  workflow_dispatch:  # Allows manual trigger if needed

jobs:
  generate-articles:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v2

      # Step 2: Set up Node.js (ensure Node.js is available for the script)
      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '16'  # Adjust based on your preferred Node.js version

      # Step 3: Install dependencies (if needed)
      - name: Install dependencies
        run: |
          npm install  # Run npm install to ensure required dependencies are available

      # Step 4: Generate Skyscanner Articles (Runs your article generation script)
      - name: Generate Skyscanner Articles
        run: node generateSkyscannerArticles.js 288  # Generates 288 articles per day (adjust as needed)

      # Step 5: Check if generated articles exist
      - name: Check if generated articles exist
        run: |
          ls -l generated-articles/  # Verifies that articles are generated in the right folder

      # Step 6: Set Git user identity to allow commit
      - name: Set Git user identity
        run: |
          git config --global user.email "github-actions@github.com"  # Use a valid email address for GitHub Actions
          git config --global user.name "GitHub Actions"  # Name for the commit author

      # Step 7: Add generated articles to git
      - name: Add generated articles to git
        run: |
          git add generated-articles/   # Ensure this points to the correct folder
          git commit -m "Generated 288 daily articles"
          git push origin main  # Push to the main branch

      # Step 8: Deploy to GitHub Pages (if needed to make the articles public)
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          personal_token: ${{ secrets.GITHUB_TOKEN }}  # Use GitHub token for deployment
          publish_dir: ./generated-articles  # Folder containing generated articles (adjust if necessary)
