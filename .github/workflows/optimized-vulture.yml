name: Optimized Vulture Deployment

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run Vulture Engine
        run: |
          # Use 'find' to locate the script if it's not in the root
          # Replace 'main.py' with your actual filename if it's different
          SCRIPT_PATH=$(find . -name "main.py" -print -quit)
          if [ -z "$SCRIPT_PATH" ]; then
            echo "Error: Could not find main.py in the repository"
            exit 1
          fi
          python "$SCRIPT_PATH"

      - name: Git Config
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Commit and Push
        run: |
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Automated SEO Update: Vulture Deployment"
            git push
          fi
