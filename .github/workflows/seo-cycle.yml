name: Continuous SEO Cycle

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes (GitHub minimum safe usage)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run SEO Brain
        run: node autonomous-seo-brain-final.js

      - name: Commit results
        run: |
          git config user.name "seo-bot"
          git config user.email "seo-bot@users.noreply.github.com"
          git add .
          git commit -m "SEO cycle update" || echo "no changes"
          git push
