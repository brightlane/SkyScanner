name: Daily Article Generator and Deployment

on:
  schedule:
    - cron: "0 8 * * *"   # runs daily at 8 AM UTC
  workflow_dispatch:       # allow manual runs

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      # ✅ Use npm ci (stable, no random changes)
      - name: Install dependencies
        run: npm ci

      # ✅ Run your generator
      - name: Generate articles
        run: npm run generate

      # ✅ Safe commit step (WILL NOT FAIL)
      - name: Commit and push changes
        run: |
          echo "Committing and pushing generated pages..."

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Automated daily article update"
            git push
          fi
