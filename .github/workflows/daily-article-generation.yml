- name: Commit generated content only
  run: |
    echo "Starting commit process..."

    git config user.name "github-actions"
    git config user.email "github-actions@github.com"

    # Stage ONLY real output folders used by any generator
    git add generated-articles pages sitemap.xml *.html *.json *.css || true

    echo "Checking for changes..."

    # If nothing meaningful changed, exit cleanly
    if git diff --cached --quiet; then
      echo "No content changes detected. Skipping commit."
      exit 0
    fi

    git commit -m "Daily article generation update"
    git push
