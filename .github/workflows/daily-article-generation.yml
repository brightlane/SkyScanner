name: Daily Article Generator and Deployment

on:
  schedule:
    - cron: "0 8 * * *"   # runs daily at 8 AM UTC
  workflow_dispatch:       # allows manual run

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm ci

      - name: Run generator
        run: npm run generate   # make sure this script exists

      - name: Commit and push changes
        run: |
          echo "Committing and pushing generated pages..."

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Automated daily article update"
            git push
          fi
