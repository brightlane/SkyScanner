- name: Commit generated content safely
  run: |
    echo "Starting deployment commit..."

    git config user.name "github-actions"
    git config user.email "github-actions@github.com"

    # --------------------------------------------------
    # STEP 1: Normalize repo state (prevents lock noise)
    # --------------------------------------------------
    git status

    # Remove dependency noise from commit safely
    git checkout -- package.json package-lock.json || true

    # --------------------------------------------------
    # STEP 2: Stage ALL possible generator outputs safely
    # (recursive, covers every known folder pattern)
    # --------------------------------------------------
    git add -A generated-articles || true
    git add -A pages || true
    git add -A dist || true
    git add -A build || true

    # also catch root-level generated outputs
    git add *.html *.json *.css *.xml *.txt 2>/dev/null || true

    echo "Checking staged changes..."

    # --------------------------------------------------
    # STEP 3: Prevent empty commits (safe exit)
    # --------------------------------------------------
    if git diff --cached --quiet; then
      echo "No generated content to commit — skipping deploy."
      exit 0
    fi

    # --------------------------------------------------
    # STEP 4: Commit safely (avoid empty commit crashes)
    # --------------------------------------------------
    git commit -m "Daily article generation update" || {
      echo "Commit failed unexpectedly — skipping"
      exit 0
    }

    # --------------------------------------------------
    # STEP 5: Push safely (handles remote drift)
    # --------------------------------------------------
    git pull --rebase || true
    git push
